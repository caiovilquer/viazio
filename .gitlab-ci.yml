stages:
  - test
  - package
  - container

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

default:
  image: maven:3.9.11-eclipse-temurin-21-alpine
  cache:
    key: maven
    paths:
      - .m2/repository

test-backend:
  stage: test
  script:
    - ./mvnw -B clean test
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml

test-frontend:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key: pnpm-frontend
    paths:
      - frontend/node_modules
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
  script:
    - cd frontend
    - pnpm install
    - pnpm lint
    - pnpm test
    - pnpm build

package:
  stage: package
  needs:
    - test-backend
    - test-frontend
  script:
    - ./mvnw -B -DskipTests package
  artifacts:
    expire_in: 1 week
    paths:
      - target/planejador-feriado-*.jar

container:
  stage: container
  image: docker:27.5-cli
  services:
    - name: docker:27.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - package
  before_script: []
  cache: []
  script:
    - docker build --pull --tag planejador-feriado:$CI_COMMIT_SHA .

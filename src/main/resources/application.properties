spring.application.name=planejador-feriado
# Spring Shell desligado por padrão para o app se comportar como servidor web normal (testes, execução na IDE).
spring.shell.interactive.enabled=true
spring.shell.noninteractive.enabled=true

# Execução única (imprime e mantém a JVM até Ctrl+C): defina SOMENTE via JVM -D, não como argumentos do shell:
#   java -Dserver.port=8081 -Dspring.shell.noninteractive.enabled=true -jar app.jar viagem --codigo BR
# Menu interativo: perfil "shell" (ver application-shell.properties).

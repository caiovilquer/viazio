spring:
  application:
    name: planejador-feriado
  # Por padrão a aplicação roda como servidor web/API (sem prompt). Para o menu
  # interativo via terminal, ative o perfil "shell" (ver application-shell.yml):
  #   ./mvnw spring-boot:run -Dspring-boot.run.profiles=shell
  shell:
    interactive:
      enabled: false
    noninteractive:
      enabled: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  rate-limit:
    capacity: 60
    refill-per-minute: 60
  external-apis:
    nager-date:
      base-url: https://date.nager.at/api/v3
    awesome-api:
      base-url: https://economia.awesomeapi.com.br/json
    open-meteo:
      base-url: https://archive-api.open-meteo.com/v1
    open-meteo-forecast:
      base-url: https://api.open-meteo.com/v1
    world-bank:
      base-url: https://api.worldbank.org/v2
    # %s é substituído pelo código do idioma (pt, en) — a API da Wikipédia usa um
    # subdomínio por idioma, então o RestClient é montado por chamada.
    wikipedia-base-url-template: https://%s.wikipedia.org/api/rest_v1
    connect-timeout: 3s
    read-timeout: 5s
  recommendation:
    estimates:
      # Base transparente para a estimativa terrestre por PPP. Não inclui passagem,
      # seguro, visto ou taxas aeroportuárias.
      baseline-daily-ground-cost-brl: 350
    # Pesos padrão (somam 1) usados quando nenhum perfil é escolhido.
    default-weights:
      weather: 0.30
      cost: 0.30
      distance: 0.25
      festivities: 0.15
    # Presets nomeados de pesos; podem ser ajustados ponto a ponto via ?weights=...
    profiles:
      equilibrado:
        weather: 0.25
        cost: 0.25
        distance: 0.25
        festivities: 0.25
      economico:
        cost: 0.55
        distance: 0.25
        weather: 0.15
        festivities: 0.05
      aventura:
        distance: 0.38
        festivities: 0.27
        weather: 0.25
        cost: 0.10
      clima-perfeito:
        weather: 0.60
        cost: 0.18
        festivities: 0.12
        distance: 0.10
      cultural:
        festivities: 0.50
        weather: 0.20
        cost: 0.17
        distance: 0.13

resilience4j:
  retry:
    instances:
      externalApi:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
  circuitbreaker:
    instances:
      externalApi:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

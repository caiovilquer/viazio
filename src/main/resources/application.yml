spring:
  application:
    name: planejador-feriado
  lifecycle:
    timeout-per-shutdown-phase: 20s
  # Por padrão a aplicação roda como servidor web/API (sem prompt). Para o menu
  # interativo via terminal, ative o perfil "shell" (ver application-shell.yml):
  #   ./mvnw spring-boot:run -Dspring-boot.run.profiles=shell
  shell:
    interactive:
      enabled: false
    noninteractive:
      enabled: false

server:
  shutdown: graceful
  forward-headers-strategy: none
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 1024

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  rate-limit:
    capacity: 60
    refill-per-minute: 60
    maximum-clients: 10000
    # Ative apenas atrás de um proxy confiável que sobrescreva X-Forwarded-For.
    trust-forwarded-headers: false
  external-apis:
    nager-date:
      base-url: https://date.nager.at/api/v3
    awesome-api:
      base-url: https://economia.awesomeapi.com.br/json
    open-meteo:
      base-url: https://archive-api.open-meteo.com/v1
    open-meteo-forecast:
      base-url: https://api.open-meteo.com/v1
    world-bank:
      base-url: https://api.worldbank.org/v2
    # %s é substituído pelo código do idioma (pt, en) — a API da Wikipédia usa um
    # subdomínio por idioma, então o RestClient é montado por chamada.
    wikipedia-base-url-template: https://%s.wikipedia.org/api/rest_v1
    connect-timeout: 3s
    read-timeout: 5s
  recommendation:
    estimates:
      # Base transparente para a estimativa terrestre por PPP: custo de um dia no Brasil,
      # em BRL. O destino é escalado por (preço_destino / preço_BR), independente da
      # origem da viagem. Não inclui passagem, seguro, visto ou taxas aeroportuárias.
      baseline-daily-ground-cost-brl: 350
    # Pesos padrão (somam 1) usados quando nenhum perfil é escolhido.
    default-weights:
      weather: 0.30
      cost: 0.30
      distance: 0.25
      festivities: 0.15
    # Presets nomeados de pesos; podem ser ajustados ponto a ponto via ?weights=...
    profiles:
      equilibrado:
        weather: 0.25
        cost: 0.25
        distance: 0.25
        festivities: 0.25
      economico:
        cost: 0.55
        distance: 0.25
        weather: 0.15
        festivities: 0.05
      aventura:
        distance: 0.38
        festivities: 0.27
        weather: 0.25
        cost: 0.10
      clima-perfeito:
        weather: 0.60
        cost: 0.18
        festivities: 0.12
        distance: 0.10
      cultural:
        festivities: 0.50
        weather: 0.20
        cost: 0.17
        distance: 0.13

resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      holidayApi:
        base-config: default
      exchangeApi:
        base-config: default
      weatherApi:
        base-config: default
      worldBankApi:
        base-config: default
      wikipediaApi:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        # Nenhuma dessas exceções indica que a API upstream está inativa, então nenhuma
        # deveria fazer abrir o circuit breaker:
        # - BulkheadFullException: uma requisição se expande para dezenas de candidatos
        #   em paralelo, então o bulkhead rejeita o overflow mesmo quando a API está
        #   saudável — essa é nossa concorrência, não deles.
        # - HttpClientErrorException (4xx, principalmente 404): ex. várias moedas
        #   africanas (XOF, BIF, BWP, AOA...) simplesmente não são suportadas pela API
        #   de câmbio gratuita — uma resposta "não encontrado" legítima, não uma falha.
        #   O breaker envolve a chamada HTTP bruta, então vê o 404 diretamente, antes da
        #   camada de serviço acima traduzir para ResourceNotFoundException — uma busca
        #   regional com alguns desses candidatos na mesma janela de 10 chamadas era
        #   suficiente para abrir o breaker por si só, e uma vez aberto, as chamadas
        #   trial do half-open continuavam caindo nos mesmos erros legítimos e reabrindo,
        #   nunca recuperando.
        # Qualquer uma dessas exceções abrindo o breaker bloqueava todos os *outros*
        # candidatos avaliados nessa janela também, incluindo dados bons — a verdadeira
        # causa do mesmo país ter ou não cotação em buscas diferentes.
        ignore-exceptions:
          - io.github.resilience4j.bulkhead.BulkheadFullException
          - org.springframework.web.client.HttpClientErrorException
    instances:
      holidayApi:
        base-config: default
      exchangeApi:
        base-config: default
      weatherApi:
        base-config: default
      worldBankApi:
        base-config: default
      wikipediaApi:
        base-config: default
  # max-wait-duration era 100ms para cada instância — muito menor que uma chamada HTTP
  # real, então em buscas grandes (até 60 candidatos em paralelo) a maioria do overflow
  # era rejeitada imediatamente em vez de ficar na fila. Agora realmente enfileira
  # esperando por um slot livre, e os limites de concorrência foram aumentados para
  # acompanhar a contagem de candidatos de uma região completa.
  bulkhead:
    instances:
      holidayApi:
        max-concurrent-calls: 30
        max-wait-duration: 2s
      exchangeApi:
        max-concurrent-calls: 30
        max-wait-duration: 2s
      weatherApi:
        max-concurrent-calls: 30
        max-wait-duration: 2s
      worldBankApi:
        max-concurrent-calls: 30
        max-wait-duration: 2s
      wikipediaApi:
        max-concurrent-calls: 10
        max-wait-duration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
    prometheus:
      access: read-only
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        travel.recommendation.duration: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"
    description: Motor explicável para planejamento de feriadões e viagens curtas

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

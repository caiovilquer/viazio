spring:
  application:
    name: planejador-feriado
  # Por padrão a aplicação roda como servidor web/API (sem prompt). Para o menu
  # interativo via terminal, ative o perfil "shell" (ver application-shell.yml):
  #   ./mvnw spring-boot:run -Dspring-boot.run.profiles=shell
  shell:
    interactive:
      enabled: false
    noninteractive:
      enabled: false

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  rate-limit:
    capacity: 60
    refill-per-minute: 60
  external-apis:
    nager-date:
      base-url: https://date.nager.at/api/v3
    awesome-api:
      base-url: https://economia.awesomeapi.com.br/json
    open-meteo:
      base-url: https://archive-api.open-meteo.com/v1
    world-bank:
      base-url: https://api.worldbank.org/v2
    # %s é substituído pelo código do idioma (pt, en) — a API da Wikipédia usa um
    # subdomínio por idioma, então o RestClient é montado por chamada.
    wikipedia-base-url-template: https://%s.wikipedia.org/api/rest_v1
    connect-timeout: 3s
    read-timeout: 5s
  recommendation:
    # Pesos padrão (somam 1) usados quando nenhum perfil é escolhido.
    default-weights:
      holidays: 0.25
      weather: 0.20
      cost: 0.20
      exchange: 0.15
      distance: 0.10
      festivities: 0.10
    # Presets nomeados de pesos; podem ser ajustados ponto a ponto via ?weights=...
    profiles:
      equilibrado:
        holidays: 0.17
        weather: 0.17
        cost: 0.17
        exchange: 0.17
        distance: 0.16
        festivities: 0.16
      economico:
        cost: 0.32
        exchange: 0.28
        holidays: 0.20
        distance: 0.12
        weather: 0.05
        festivities: 0.03
      aventura:
        distance: 0.30
        festivities: 0.22
        holidays: 0.20
        weather: 0.18
        cost: 0.06
        exchange: 0.04
      clima-perfeito:
        weather: 0.45
        holidays: 0.20
        cost: 0.13
        festivities: 0.10
        distance: 0.07
        exchange: 0.05
      cultural:
        festivities: 0.35
        holidays: 0.25
        weather: 0.15
        cost: 0.12
        distance: 0.08
        exchange: 0.05

resilience4j:
  retry:
    instances:
      externalApi:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
  circuitbreaker:
    instances:
      externalApi:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

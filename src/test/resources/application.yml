spring:
  shell:
    interactive:
      enabled: false
    noninteractive:
      enabled: false

logging:
  level:
    root: WARN
    br.usp.lab.oo: INFO
    org.springframework: WARN
    org.springframework.web: WARN

app:
  rate-limit:
    capacity: 60
    refill-per-minute: 60
    maximum-clients: 1000
    trust-forwarded-headers: false
  external-apis:
    nager-date:
      base-url: https://date.nager.at/api/v3
    awesome-api:
      base-url: https://economia.awesomeapi.com.br/json
    open-meteo:
      base-url: https://archive-api.open-meteo.com/v1
    open-meteo-forecast:
      base-url: https://api.open-meteo.com/v1
    world-bank:
      base-url: https://api.worldbank.org/v2
    wikipedia-base-url-template: https://%s.wikipedia.org/api/rest_v1
  recommendation:
    estimates:
      baseline-daily-ground-cost-brl: 350
    default-weights:
      weather: 0.30
      cost: 0.30
      distance: 0.25
      festivities: 0.15
    profiles:
      economico:
        cost: 0.55
        distance: 0.25
        weather: 0.15
        festivities: 0.05
      clima-perfeito:
        weather: 0.60
        cost: 0.18
        festivities: 0.12
        distance: 0.10

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      access: read-only
  prometheus:
    metrics:
      export:
        enabled: true
